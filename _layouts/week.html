---
layout: default
---

<div class="page-head">
  <div>
    <h1 id="weekTitle">Week {{ page.week }}</h1>
    <p class="muted">Pick a worksheet, choose how many questions, then start.</p>
  </div>
  <a id="youtubeLink" class="btn" href="#" target="_blank" rel="noopener">YouTube link</a>
</div>

<section class="card">
  <h2>Worksheets</h2>

  <div class="controls">
    <label>
      Quiz
      <select id="quizType">
        <option value="pinyin">Match Pinyin → 汉字</option>
        <option value="meaning">Match Meaning → 汉字</option>
      </select>
    </label>

    <label>
      Questions
      <select id="questionMode">
        <option value="all">All 50</option>
        <option value="random">Random N</option>
      </select>
    </label>

    <label id="randomCountWrap" class="inline" style="display:none;">
      N
      <input id="randomCount" type="number" min="1" max="50" value="20" />
    </label>

    <label class="check">
      <input id="includePrev" type="checkbox" />
      Include previous weeks as distractors
    </label>

    <button id="startQuiz" class="btn" type="button">Start</button>
  </div>

  <div id="quizArea" class="quiz-area" hidden>
    <div class="quiz-top">
      <div class="pill" id="progressText"></div>
      <div class="pill" id="scoreText"></div>
    </div>

    <div class="prompt" id="prompt"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>

    <div class="nav-row">
      <button id="nextBtn" class="btn" type="button" disabled>Next</button>
      <button id="restartBtn" class="btn ghost" type="button">Restart</button>
    </div>
  </div>
</section>

<section class="card">
  <details open>
    <summary class="summary">Study List (50 words)</summary>
    <div id="studyTableWrap" class="mt"></div>
  </details>
</section>

<section class="card">
  <div class="reading-head">
    <div>
      <h2 style="margin:0;">Reading Study</h2>
      <p class="muted small" style="margin:6px 0 0;">Hover over the Chinese to see pinyin + meaning.</p>
    </div>

    <label id="englishToggleWrap" class="check" style="margin:0;">
      <input id="toggleEnglish" type="checkbox" />
      Show English translations
    </label>
  </div>

  <div id="readingText" class="reading-text"></div>
</section>

<script>
  window.STUDY = {
    week: {{ page.week | jsonify }},
    baseurl: {{ site.baseurl | jsonify }}
  };
</script>

<script src="//mandarinspot.com/static/mandarinspot.min.js" charset="UTF-8"></script>
<script src="{{ '/assets/js/week.js' | relative_url }}"></script>
